<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>v-cel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --text-muted: #888;
      --accent: #4f8ef7;
      --danger: #e05252;
      --success: #52e08a;
      --radius: 12px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 15px;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--danger);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    #status-dot.connected { background: var(--success); }

    #model-badge {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--border);
      padding: 3px 8px;
      border-radius: 20px;
      flex-shrink: 0;
    }

    #generating-indicator {
      font-size: 12px;
      color: var(--accent);
      margin-left: auto;
      display: none;
    }
    #generating-indicator.visible { display: block; }

    /* Chat */
    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      -webkit-overflow-scrolling: touch;
    }

    .message {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: var(--radius);
      line-height: 1.5;
      word-break: break-word;
      white-space: pre-wrap;
      font-size: 14px;
    }

    .message.user {
      align-self: flex-end;
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.ai {
      align-self: flex-start;
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .message.unknown {
      align-self: flex-start;
      background: var(--surface);
      border: 1px solid var(--border);
      opacity: 0.7;
    }

    #empty-state {
      text-align: center;
      color: var(--text-muted);
      margin: auto;
      font-size: 14px;
    }

    /* Input bar */
    #input-bar {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      align-items: flex-end;
    }

    #message-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      padding: 10px 14px;
      resize: none;
      max-height: 120px;
      min-height: 44px;
      line-height: 1.4;
      outline: none;
    }
    #message-input:focus { border-color: var(--accent); }
    #message-input::placeholder { color: var(--text-muted); }

    button {
      height: 44px;
      min-width: 44px;
      border: none;
      border-radius: var(--radius);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }
    button:active { opacity: 0.7; }

    #send-btn {
      background: var(--accent);
      color: #fff;
      padding: 0 16px;
      font-size: 15px;
      font-weight: 600;
    }

    #stop-btn {
      background: var(--danger);
      color: #fff;
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div id="status-dot"></div>
      <span id="model-badge">desconectado</span>
      <span id="generating-indicator">gerando...</span>
    </header>

    <div id="chat-container">
      <div id="empty-state">Aguardando conexão com Antigravity...</div>
    </div>

    <div id="input-bar">
      <textarea
        id="message-input"
        placeholder="Digite uma mensagem..."
        rows="1"
      ></textarea>
      <button id="stop-btn" title="Parar geração">⏹</button>
      <button id="send-btn">Enviar</button>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
